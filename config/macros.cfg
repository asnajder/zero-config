[gcode_macro START_PRINT]
gcode:
	# Fetches data from your slicer. Such as bed temp, extruder temp, chamber temp and size of your printer.
	{% set target_bed = params.BED|int %}
	{% set target_extruder = params.EXTRUDER|int %}
	{% set target_chamber = params.CHAMBER|default("45")|int %}
	{% set target_chamber_minimal = params.CHAMBER_MINIMAL|default("0")|int %}
	{% set target_chamber_wait = [target_chamber, target_chamber_minimal]|select(">", 0)|min|default(0) %}
	{% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
	{% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

	# Clear any lingering pause states
	CLEAR_PAUSE
    BED_MESH_CLEAR
    # Homes the printer and sets absolute positioning
    G28                                                 # Full home (XYZ)
    G90                                                 # Absolute position
    # Checks if the bed temp is higher than 90c - if so then trigger a heatsoak
    M117 Heat Soak
    {% if params.BED|int > 90 %}
      M106 S255                                         # Turn on the PT-fan
      CENTER
      M190 S{target_bed}                                # Set target temp for the bed
      SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={target_chamber}
      TEMPERATURE_WAIT SENSOR="temperature_sensor chamber_mcu_Temp" MINIMUM={target_chamber_wait}   # Wait for chamber temp

    # If the bed temp is not over 90c it skips the heatsoak and just heats up to set temp with a 1 min soak.
    {% else %}
      CENTER                                            # Go to center of the bed
      M190 S{target_bed}                                # Set target temp for the bed
      G4 P300000                                        # Wait 5 min for the bedtemp to stabilize
    {% endif %}

    M117 Clean Nozzle
    CLEAN_NOZZLE
	
	CENTER
	
	M117 Tappy Tap...
	SET_Z_FROM_PROBE METHOD=tap

    M117 Bed Mesh
	SET_SCAN_FROM_TAP
    # For best results should match the previous command "scan" height
    {% set scan_height = printer.configfile.settings["probe_eddy_current my_eddy_probe"].z_offset  %}
    BED_MESH_CALIBRATE ADAPTIVE=1 METHOD=scan HORIZONTAL_MOVE_Z={scan_height}
    
    M400                                                 # Wait for current moves to finish

    CENTER

    M117 Final Nozzle Temp
	# Heats up the hotend up to target via slicer
	M107                                                # Turn off partcooling fan
	M109 S{target_extruder}                             # Heat hotend to print temp
	M117 Printer goes brrr
	
[gcode_macro END_PRINT]
gcode:
	# Get Boundaries
	{% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
	{% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
	{% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
	
	# Set safety margins (5% from edges)
	{% set x_margin = max_x * 0.05 %}
	{% set y_margin = max_y * 0.05 %}
	
	# Calculate safe parking positions
	{% set safe_x = x_margin %}               # 5% from X=0
	{% set safe_y = max_y - y_margin %}       # 5% from max Y
	
	# Check end position to determine safe directions to move
	{% if printer.toolhead.position.x < (max_x - 20) %}
		{% set x_safe = 20.0 %}
	{% else %}
		{% set x_safe = -20.0 %}
	{% endif %}

	{% if printer.toolhead.position.y < (max_y - 20) %}
		{% set y_safe = 20.0 %}
	{% else %}
		{% set y_safe = -20.0 %}
	{% endif %}

	{% if printer.toolhead.position.z < (max_z - 2) %}
		{% set z_safe = 2.0 %}
	{% else %}
		{% set z_safe = max_z - printer.toolhead.position.z %}
	{% endif %}

	# Commence END_PRINT
	M400                                                         # wait for buffer to clear
	G92 E0                                                       # zero the extruder
	G1 E-3.0 F1800                                               # retract
	G91                                                          # relative positioning
	G0 Z{z_safe} F3600                                           # move nozzle up
	M104 S0                                                      # turn off hotend
	M140 S0                                                      # turn off bed
	M106 S0                                                      # turn off fan
	M107                                                         # turn off part cooling fan
	G90                                                          # absolute positioning
	G1 X{safe_x} Y{safe_y} F2000                                 # move to safe front position

	# Safe Z-drop if near maximum height (after parking)
	{% if printer.toolhead.position.z > (max_z - 20) %}
		G91                                                        # relative positioning
		G1 Z-10 F600                                               # drop 10mm if near the top
		G90                                                        # back to absolute
	{% endif %}

	M117 Print finished!!                                        # Displays info on LCD

# x: -9.5 left edge, -6 right edge
# y: 35 back, 5 front
# z: 0.0 just above, -2 inside
[gcode_macro CLEAN_NOZZLE] 
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
       G28
    {% endif %}
    G90 

    G1 X-7.5 Y15 Z10 F9000
    M109 S200
    G4 P100 # pause 100ms?
    M400 # wait for moves

    G1 Z-2 F9000

    G1 Y45 F2400
    G1 X-8.2 Y10
    G1 Y45 
    G1 X-8.2 Y10
    G1 Y38
    G1 X-9.2 Y12
    G1 Y38
    G1 X-9.2 Y12
    G1 Y33 
    G1 X-8.2 Y14
    G1 Y33 
    G1 X-8.2 Y14
    G1 Y28
    G1 X-9.2 Y16
    G1 Y28
    G1 X-9.2 Y16

    G1 Z5
    # start cooling down
    M106 S255
    M109 S170 # wait for 170
    M104 S150 # but keep going down to 150

    # clean while cooler a bit more
    G1 Z-2
    G1 X-8.2 Y14
    G1 Y33 
    G1 X-8.2 Y14
    G1 Y28
    G1 X-9.2 Y16
    G1 Y28
    G1 X-9.2 Y16
    G1 Z10
    M400 # wait for moves
    M109 S150 # finish cooling down
    M106 S0 # fan off

[gcode_macro CENTER]
description: Move the toolhead to the center of objects to be printed, or center of build plate
gcode:
    {% set center_x = printer.toolhead.axis_maximum.x / 2 | float %}
    {% set center_y = printer.toolhead.axis_maximum.y / 2 | float %}
    {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}
    {% set x_min = all_points | map(attribute=0) | min | default(center_x) %}
    {% set y_min = all_points | map(attribute=1) | min | default(center_y) %}
    {% set x_max = all_points | map(attribute=0) | max | default(center_x) %}
    {% set y_max = all_points | map(attribute=1) | max | default(center_y) %}
    {% set travel_speed = (printer.toolhead.max_velocity) * 30 | float %}
    
    {% set center_x = (x_min + x_max) / 2.0 | round(1) %}
    {% set center_y = (y_min + y_max) / 2.0 | round(1) %}
    
    SAVE_GCODE_STATE NAME=Pre_Center_State
    G90
    G0 X{center_x} Y{center_y} F{travel_speed}
    M400
    RESTORE_GCODE_STATE NAME=Pre_Center_State

[gcode_macro LOAD_FILAMENT]
gcode:
    # Parameters with defaults
    {% set speed = params.SPEED|default(300) %}
    {% set load_distance = params.LOAD_DISTANCE|default(45)|int %}
    {% set purge_distance = params.PURGE_DISTANCE|default(30)|int %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(250)|int %}
    
    # Current state variables
    {% set current_target_temp = printer.extruder.target|int %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity * 60 %}

    {% if printer.print_stats.state != "printing" %}
        # Temperature management logic
        {% if printer.print_stats.state != "paused" %}
            M104 S{extruder_temp}
            M117 Nozzle heating...
            {action_respond_info("Nozzle not hot enough!")}
            {action_respond_info("Nozzle heating...")}
            M109 S{extruder_temp}
        {% else %}
            {% if printer.extruder.target == 0 %}
                M104 S{extruder_temp}
                M117 Nozzle heating...
                {action_respond_info("Nozzle not hot enough!")}
                {action_respond_info("Nozzle heating...")}
                M109 S{extruder_temp}
            {% else %}
                M104 S{printer.extruder.target}
                M117 Nozzle heating...
                {action_respond_info("Nozzle not hot enough!")}
                {action_respond_info("Nozzle heating...")}
                M109 S{printer.extruder.target}
            {% endif %}
        {% endif %}
        
        # Filament loading sequence
        M117 Loading filament...
        SAVE_GCODE_STATE NAME=load_state
        G91 
        G92 E0
        G1 E{load_distance} F{max_velocity}   # Fast-load
        G1 E{purge_distance} F{speed}         # Purge at controlled speed
        G90
        M400
        RESTORE_GCODE_STATE NAME=load_state
        M117 Load complete
        M400
        
        # Temperature cleanup
        {% if current_target_temp == 0 or printer.print_stats.state != "paused" %}
            M104 S0
        {% endif %}
    {% else %}
        {action_respond_info("Don't load filament during printing!!!")}
    {% endif %}

[gcode_macro UNLOAD_FILAMENT]
gcode:
    # Parameters with defaults
    {% set speed = params.SPEED|default(300) %}
    {% set unload_distance = params.UNLOAD_DISTANCE|default(50)|int %}
    {% set purge_distance = params.PURGE_DISTANCE|default(25)|int %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(250)|int %}
    
    # Current state variables
    {% set current_target_temp = printer.extruder.target|int %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity * 60 %}

    {% if printer.print_stats.state != "printing" %}
        # Temperature management logic
        {% if printer.print_stats.state != "paused" %}
            M104 S{extruder_temp}
            M117 Nozzle heating...
            {action_respond_info("Nozzle not hot enough!")}
            {action_respond_info("Nozzle heating...")}
            M109 S{extruder_temp}
        {% else %}
            {% if printer.extruder.target == 0 %}
                M104 S{extruder_temp}
                M117 Nozzle heating...
                {action_respond_info("Nozzle not hot enough!")}
                {action_respond_info("Nozzle heating...")}
                M109 S{extruder_temp}
            {% else %}
                M104 S{printer.extruder.target}
                M117 Nozzle heating...
                {action_respond_info("Nozzle not hot enough!")}
                {action_respond_info("Nozzle heating...")}
                M109 S{printer.extruder.target}
            {% endif %}
        {% endif %}
        
        # Filament unloading sequence
        M117 Unloading filament...
        SAVE_GCODE_STATE NAME=unload_state
        G91
        G92 E0
        G1 E{purge_distance} F{speed}         # Purge first
        G1 E-10 F1500                         # Quick retract
        G1 E-20 F600                          # Slower retract
        M400
        G4 P3000                              # Pause for cooling
        G1 E-{unload_distance} F{max_velocity} # Fast unload
        G90
        M400
        RESTORE_GCODE_STATE NAME=unload_state
        M117 Unload complete
        M400
        
        # Temperature cleanup
        {% if current_target_temp == 0 or printer.print_stats.state != "paused" %}
            M104 S0
        {% endif %}
    {% else %}
        {action_respond_info("Don't unload filament during printing!!!")}
    {% endif %}

[gcode_macro M106]
gcode:
    {% set fan = 'fan' + (params.P|int if params.P is defined else 0)|string %}
    {% set speed = (params.S|float / 255 if params.S is defined else 1.0) %}
        SET_FAN_SPEED FAN={fan} SPEED={speed}

[gcode_macro M107]
gcode:
    {% set fan = 'fan' + (params.P|int if params.P is defined else 0)|string %}
        SET_FAN_SPEED FAN={'fan0'} SPEED=0
        SET_FAN_SPEED FAN={'fan2'} SPEED=0